services:
  greenforest-reading:
    build: .
    container_name: greenforest-reading
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-Qk-max/readingweb}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
    volumes:
      - ./data:/app/data
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: nail-appointment_default
